            stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="59,34 68,34 68,43"
            fill="none" stroke="url(#edgrGrad)" stroke-width="5.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="96" y="76" font-family="Helvetica, Arial, sans-serif" font-size="58"
        font-weight="800" letter-spacing="-2" fill="#E6EDF3">edgr</text>
