<svg width="340" height="110" viewBox="0 0 340 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="edgr logo">
  <defs>
    <linearGradient id="edgrGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Rising "edge" mark -->
  <rect x="6" y="18" width="74" height="74" rx="18" fill="#111827" stroke="url(#edgrGrad)" stroke-width="2.5"/>
  <polyline points="20,74 37,57 50,64 68,34"
